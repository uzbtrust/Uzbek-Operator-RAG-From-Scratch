tokenizer:
  vocab_size: 16000
  min_frequency: 2
  special_tokens:
    - "[PAD]"
    - "[UNK]"
    - "[CLS]"
    - "[SEP]"
    - "[MASK]"
  save_path: "tokenizer/bpe_tokenizer"
  training_corpus_size: 2000000

model:
  num_layers: 8
  hidden_size: 512
  num_heads: 8
  intermediate_size: 2048
  max_seq_len: 512
  dropout: 0.1
  vocab_size: 16000

pretraining:
  mlm_probability: 0.15
  batch_size: 32
  learning_rate: 1.0e-4
  weight_decay: 0.01
  warmup_steps: 10000
  max_steps: 500000
  fp16: true
  gradient_checkpointing: true
  save_every: 10000
  log_every: 100
  checkpoint_dir: "checkpoints/pretrain"
  num_shards: 3

finetuning:
  batch_size: 64
  learning_rate: 3.0e-5
  epochs: 5
  temperature: 0.05
  save_path: "checkpoints/simcse"

retriever:
  sparse_weight: 0.5
  dense_weight: 0.5
  top_k: 3
  confidence_threshold: 0.35
  faiss_index_path: "index/faiss.index"

generator:
  model_name: "Qwen/Qwen2.5-7B-Instruct"
  max_new_tokens: 256
  temperature: 0.1
  load_in_8bit: true

data:
  wiki_subset: "20231101.en"
  bookcorpus_name: "bookcorpus/bookcorpus"
  shard_dir: "data/shards"
  num_shards: 3
  streaming: true

ui:
  title: "Operator Assistant"
  port: 7860
